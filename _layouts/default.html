<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {% seo %}
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="{{ '/' | relative_url }}" class="site-title">
        <span class="metro-logo">М</span>
        {{ site.title }}
      </a>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}">Все станции</a>
        <a href="{{ '/lines/' | relative_url }}">По линиям</a>
        <!--<a href="{{ '/stats/' | relative_url }}">Статистика</a>-->
      </nav>
    </div>
  </header>

  <main class="main-content">
    <div class="container">
      {{ content }}
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>{{ site.title }} · Сделано на <a href="https://jekyllrb.com">Jekyll</a>.</p>
    </div>
  </footer>
</body>
</html>
